name: Release builds (Windows & macOS)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CLEAN="${TAG#v}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${CLEAN}';fs.writeFileSync('./package.json',JSON.stringify(p,null,2));"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup native binary (Windows)
        shell: bash
        run: |
          VER=$(node -p "require('rollup/package.json').version")
          npm i -D @rollup/rollup-win32-x64-msvc@"${VER}"

      - name: Build Windows app (no publish)
        run: npm run electron:build:win -- --publish=never

      - name: Pack portable ZIP
        run: npm run pack:zip

      - name: Rename portable zip
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "dist-electron" -Filter "*.zip" -File
          foreach ($f in $files) {
            $m = ($f.Name | Select-String -Pattern "-v([0-9.]+)-windows-portable\.zip")
            if ($m) {
              $version = $m.Matches[0].Groups[1].Value
              $newName = "Reflectance-Spectra-Viewer-v$version`_win.zip"
              Rename-Item -Path $f.FullName -NewName $newName
            }
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-dist
          path: dist-electron

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/Reflectance-Spectra-Viewer-v*_win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-x64:
    name: Build macOS (x64) dmg/zip
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CLEAN="${TAG#v}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${CLEAN}';fs.writeFileSync('./package.json',JSON.stringify(p,null,2));"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup native binary (macOS arm64)
        run: |
          VER=$(node -p "require('rollup/package.json').version")
          npm i -D @rollup/rollup-darwin-arm64@"${VER}"

      - name: Build macOS app x64 (cross-compile on arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run electron:build:mac -- --publish=never --x64

      - name: Ad-hoc codesign and re-create x64 DMG
        run: |
          app=$(find dist-electron -path "*/mac*/*.app" -type d | head -n1)
          codesign --force --deep --sign - "$app"
          echo "Signed: $app"
          rm -f dist-electron/*.dmg
          staging=$(mktemp -d)
          cp -R "$app" "$staging/"
          ln -s /Applications "$staging/Applications"
          VERSION=$(node -p 'require("./package.json").version')
          hdiutil create \
            -volname "Reflectance Spectra Viewer" \
            -srcfolder "$staging" \
            -ov -format UDZO \
            "dist-electron/Reflectance Spectra Viewer-${VERSION}-x64.dmg"
          rm -rf "$staging"

      - name: Rename macOS x64 DMG
        run: |
          mkdir -p dist-electron/renamed
          for f in dist-electron/*.dmg; do
            base="${f##*/}"
            version=$(echo "$base" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
            [ -n "$version" ] && mv "$f" "dist-electron/renamed/Reflectance.Spectra.Viewer-${version}_mac_x64.dmg"
          done

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-dist
          path: dist-electron/renamed

      - name: Attach macOS x64 DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/renamed/Reflectance.Spectra.Viewer-*_mac_x64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS (arm64) dmg/zip
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CLEAN="${TAG#v}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${CLEAN}';fs.writeFileSync('./package.json',JSON.stringify(p,null,2));"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup native binary (macOS arm64)
        run: |
          VER=$(node -p "require('rollup/package.json').version")
          npm i -D @rollup/rollup-darwin-arm64@"${VER}"

      - name: Build macOS app (no publish)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run electron:build:mac -- --publish=never

      - name: Ad-hoc codesign and re-create arm64 DMG
        run: |
          app=$(find dist-electron -path "*/mac*/*.app" -type d | head -n1)
          codesign --force --deep --sign - "$app"
          echo "Signed: $app"
          rm -f dist-electron/*.dmg
          staging=$(mktemp -d)
          cp -R "$app" "$staging/"
          ln -s /Applications "$staging/Applications"
          VERSION=$(node -p 'require("./package.json").version')
          hdiutil create \
            -volname "Reflectance Spectra Viewer" \
            -srcfolder "$staging" \
            -ov -format UDZO \
            "dist-electron/Reflectance Spectra Viewer-${VERSION}-arm64.dmg"
          rm -rf "$staging"

      - name: Rename macOS arm64 DMG
        run: |
          mkdir -p dist-electron/renamed
          for f in dist-electron/*.dmg; do
            base="${f##*/}"
            version=$(echo "$base" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
            [ -n "$version" ] && mv "$f" "dist-electron/renamed/Reflectance.Spectra.Viewer-${version}_mac_arm64.dmg"
          done

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-dist
          path: dist-electron/renamed

      - name: Attach macOS arm64 DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/renamed/Reflectance.Spectra.Viewer-*_mac_arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-web:
    name: Build web (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CLEAN="${TAG#v}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${CLEAN}';fs.writeFileSync('./package.json',JSON.stringify(p,null,2));"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup native binary (Linux)
        run: |
          VER=$(node -p "require('rollup/package.json').version")
          npm i -D @rollup/rollup-linux-x64-gnu@"${VER}"

      - name: Build
        run: npm run build

      - name: Zip web dist with version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"; CLEAN="${TAG#v}"
          zip -qry "web-dist-v${CLEAN}.zip" dist

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist-v*.zip

      - name: Attach web dist to Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-dist-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
