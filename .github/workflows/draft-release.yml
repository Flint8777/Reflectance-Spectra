name: Create Draft Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "current_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: "リリースノートを生成中です。`bash scripts/release-notes.sh ${{ steps.tag.outputs.current_tag }}` を実行してください。"
          name: "Release ${{ steps.tag.outputs.current_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
