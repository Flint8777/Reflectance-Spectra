name: Verify Build Artifacts

on:
  workflow_run:
    workflows: ["Release builds (Windows & macOS)"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  verify-windows:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable-dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract and verify
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) { Write-Host "❌ ZIP file not found"; exit 1 }
          Write-Host "Found: $($zip.Name)"
          Expand-Archive -Path $zip.FullName -DestinationPath "extracted"
          $exe = Get-ChildItem -Path "extracted" -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Host "❌ Executable not found"; exit 1 }
          Write-Host "Executable found: $($exe.FullName)"
          $proc = Start-Process -FilePath $exe.FullName -PassThru -WindowStyle Hidden
          # 最大30秒ポーリングして起動確認
          $started = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            if (-not $proc.HasExited) { $started = $true; break }
          }
          if ($started) {
            Write-Host "✅ App started successfully"
            Stop-Process -Id $proc.Id -Force
          } else {
            Write-Host "❌ App crashed immediately"
            exit 1
          }

  verify-macos-x64:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-13
    steps:
      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-x64-dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract and verify
        run: |
          zip_file=$(find . -name "*.zip" -type f | head -n1)
          if [ -z "$zip_file" ]; then echo "❌ ZIP file not found"; exit 1; fi
          echo "Found: $zip_file"
          unzip -q "$zip_file"
          app=$(find . -name "*.app" -type d | head -n1)
          if [ -z "$app" ]; then echo "❌ .app bundle not found"; exit 1; fi
          echo "App found: $app"
          open "$app"
          # 最大30秒ポーリングして起動確認
          for i in $(seq 1 30); do
            sleep 1
            if pgrep -f "Reflectance Spectra Viewer" > /dev/null 2>&1; then
              echo "✅ App started successfully (${i}s)"
              pkill -f "Reflectance Spectra Viewer" 2>/dev/null || true
              exit 0
            fi
          done
          echo "❌ App failed to start within 30 seconds"
          exit 1

  verify-macos-arm64:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-14
    steps:
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64-dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract and verify
        run: |
          zip_file=$(find . -name "*.zip" -type f | head -n1)
          if [ -z "$zip_file" ]; then echo "❌ ZIP file not found"; exit 1; fi
          echo "Found: $zip_file"
          unzip -q "$zip_file"
          app=$(find . -name "*.app" -type d | head -n1)
          if [ -z "$app" ]; then echo "❌ .app bundle not found"; exit 1; fi
          echo "App found: $app"
          open "$app"
          # 最大30秒ポーリングして起動確認
          for i in $(seq 1 30); do
            sleep 1
            if pgrep -f "Reflectance Spectra Viewer" > /dev/null 2>&1; then
              echo "✅ App started successfully (${i}s)"
              pkill -f "Reflectance Spectra Viewer" 2>/dev/null || true
              exit 0
            fi
          done
          echo "❌ App failed to start within 30 seconds"
          exit 1
